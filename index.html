<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozoemenam Endurance | Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100">
    <div id="root"></div>

<script type="text/babel" src="endurance-portfolio-final.jsx?v=2"></script>
    <script type="text/babel">
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                try {
                    const container = document.getElementById('root');
                    const root = ReactDOM.createRoot(container);
                    root.render(React.createElement(window.Portfolio || App));
                } catch(e) {
                    console.error("Render initialization caught: ", e);
                }
            }, 200);
        });
    </script>
</body>
</html>
